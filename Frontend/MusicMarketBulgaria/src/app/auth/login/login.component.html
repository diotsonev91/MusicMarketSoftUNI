

<main>
  <section class="form-section">
      <h2>Вход</h2>
      <form (ngSubmit)="onLogin()"> 
          <label for="email">Имейл:</label>
          <input type="email" id="email" name="email" [(ngModel)]="email" required> <!-- Binds to email -->

          <label for="password">Парола:</label>
          <input type="password" id="password" name="password" [(ngModel)]="password" required> <!-- Binds to password -->

          <button type="submit" class="form-button">Вход</button>
      </form>
      <p>{{ message }}</p> <!-- Displays login message -->
      <p>Нямате профил? <a routerLink="/register">Регистрирайте се тук</a>.</p> <!-- Link to register page -->
  </section>
</main>
